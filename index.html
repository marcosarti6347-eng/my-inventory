<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 재고관리 시스템 (유동 코드 지원)</title>
    <!-- Tesseract OCR 라이브러리 로드 -->
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f5f7fb; color: #333; padding: 15px; -webkit-user-select: none; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 15px; color: #1e3a8a; font-size: 1.4rem; }
        
        /* 카드 스타일 */
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .card-title { font-size: 1rem; font-weight: bold; margin-bottom: 10px; color: #4b5563; display: flex; justify-content: space-between; }
        
        /* 입력 폼 */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; color: #6b7280; margin-bottom: 4px; font-weight: 600; }
        .input-row { display: flex; gap: 8px; }
        input[type="text"], input[type="number"] { flex: 1; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; }
        
        /* 버튼 스타일 */
        button { background-color: #2563eb; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
        button:active { background-color: #1d4ed8; }
        button.btn-success { background-color: #10b981; width: 100%; padding: 12px; font-size: 1.1rem; margin-top: 5px; }
        button.btn-success:active { background-color: #059669; }
        button.btn-secondary { background-color: #4b5563; }
        
        /* 카메라 모달 */
        #cameraModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        #videoContainer { position: relative; width: 90%; max-width: 400px; aspect-ratio: 1; border-radius: 16px; overflow: hidden; border: 3px solid #3b82f6; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 스캔 가이드 가이드라인 (중앙 조준점) */
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 25%; border: 2px dashed #10b981; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5); pointer-events: none; border-radius: 4px; }
        .scan-guide::after { content: "2~6자리 숫자 코드를 맞추세요"; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); color: #10b981; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
        
        .camera-controls { margin-top: 20px; display: flex; gap: 15px; width: 90%; max-width: 400px; }
        .camera-controls button { flex: 1; padding: 12px; font-size: 1rem; }
        
        /* 로딩 애니메이션 */
        #loadingOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1rem; z-index: 10; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #3b82f6; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 이미지 미리보기 */
        .img-preview { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #e5e7eb; border: 1px solid #d1d5db; }
        .photo-row { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        
        /* 리스트 스타일 */
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #edf2f7; }
        .history-item:last-child { border-bottom: none; }
        .info-zone { display: flex; align-items: center; gap: 10px; }
        .code-tag { background: #eff6ff; color: #1e40af; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 수기 재고 현장 등록</h2>
    
    <!-- 입력 및 카메라 구역 -->
    <div class="card">
        <div class="card-title">기본 정보 입력</div>
        
        <div class="form-group">
            <label>제품 코드 (2~6자리 숫자)</label>
            <div class="input-row">
                <input type="text" id="productCode" placeholder="스캔하거나 입력하세요" inputmode="numeric" pattern="[0-9]*">
                <button type="button" onclick="openScanner()">📸 스캔</button>
            </div>
        </div>
        
        <div class="form-group">
            <label>현재 수량 (실사 재고)</label>
            <input type="number" id="productQty" value="1" min="1">
        </div>
        
        <div class="form-group">
            <label>증빙 사진 등록 (선택)</label>
            <div class="photo-row">
                <button type="button" class="btn-secondary" onclick="triggerCameraInput()">🖼️ 사진 찍기</button>
                <input type="file" id="photoFile" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(this)">
                <img id="photoPreview" class="img-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>" alt="미리보기">
            </div>
        </div>
        
        <button class="btn-success" onclick="saveToDatabase()">💾 장부 저장 및 반영</button>
    </div>

    <!-- 최근 등록 내역 (IndexedDB 연동) -->
    <div class="card">
        <div class="card-title">
            <span>최근 현장 등록 내역</span>
            <span style="font-size:0.8rem; color:#9ca3af; font-weight:normal;">폰 내부 저장소(무제한)</span>
        </div>
        <div id="historyList" style="max-height: 250px; overflow-y: auto;">
            <p style="text-align:center; color:#9ca3af; padding:20px; font-size:0.9rem;">등록된 내역이 없습니다.</p>
        </div>
    </div>
</div>

<!-- 실시간 OCR 카메라 스캔 모달 -->
<div id="cameraModal">
    <div id="videoContainer">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-guide"></div>
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div id="loadingText">인식 엔진 준비 중...</div>
        </div>
    </div>
    <div class="camera-controls">
        <button type="button" class="btn-secondary" onclick="closeScanner()">닫기</button>
        <button type="button" onclick="captureAndOCR()" style="background-color:#10b981;">🎯 지금 판독</button>
    </div>
</div>

<script>
    // 1. 데이터베이스(IndexedDB) 초기화 설정
    let db = null;
    const request = indexedDB.open("InventoryDB", 1);
    
    request.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("items")) {
            db.createObjectStore("items", { keyPath: "code" });
        }
    };
    
    request.onsuccess = function(e) {
        db = e.target.result;
        loadHistory(); // 앱 켜질 때 기존 데이터 불러오기
    };

    // 2. OCR 인식 엔진 전역 설정 및 초기화 구동
    let worker = null;
    async function initOCR() {
        if (!worker) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').innerText = "엔진 최적화 중...";
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng'); // 숫자 인식률 극대화를 위해 영어 데이터셋 사용
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789', // 오직 숫자만 판독하도록 강제 제한
            });
        }
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    // 3. 카메라 구동 및 모달 제어
    let stream = null;
    async function openScanner() {
        document.getElementById('cameraModal').style.display = 'flex';
        await initOCR();
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            document.getElementById('video').srcObject = stream;
        } catch (err) {
            alert("카메라를 켤 수 없습니다. 권한을 확인해 주세요.");
            closeScanner();
        }
    }

    function closeScanner() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        document.getElementById('cameraModal').style.display = 'none';
    }

    // 4. [핵심 로직] 카메라 프레임 캡처 및 유동 코드(2~6자리) 판독
    async function captureAndOCR() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingText').innerText = "글자 판독 중...";

        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        
        // 크롭(Crop) 연산: 스캔 가이드 영역(중앙부)만 정밀하게 잘라내어 인식률 대폭 향상
        const scale = video.videoWidth / video.clientWidth;
        const boxWidth = video.clientWidth * 0.7 * scale;
        const boxHeight = video.clientHeight * 0.25 * scale;
        const boxLeft = (video.videoWidth - boxWidth) / 2;
        const boxTop = (video.videoHeight - boxHeight) / 2;

        canvas.width = boxWidth;
        canvas.height = boxHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, boxLeft, boxTop, boxWidth, boxHeight, 0, 0, boxWidth, boxHeight);

        try {
            const { data: { text } } = await worker.recognize(canvas);
            
            // 정규식 변경: 공백 제거 후 2자리에서 6자리 사이의 연속된 숫자들을 추출
            const cleanedText = text.replace(/\s+/g, '');
            const matches = cleanedText.match(/\d{2,6}/g);

            if (matches && matches.length > 0) {
                // 여러 개가 검출될 경우 가장 길게 매칭된 숫자를 우선 선택 (예: 12와 12345가 같이 읽히면 12345 선택)
                const finalCode = matches.reduce((a, b) => a.length >= b.length ? a : b);
                
                document.getElementById('productCode').value = finalCode;
                
                // 보이스 피드백 (현장에서 소리로 즉시 확인 가능)
                if ('speechSynthesis' in window) {
                    const speech = new SpeechSynthesisUtterance(`코드 ${finalCode.split('').join(' ')} 인식 완료`);
                    speech.lang = 'ko-KR';
                    window.speechSynthesis.speak(speech);
                }
                
                closeScanner();
            } else {
                alert("숫자 코드를 인식하지 못했습니다. 초점을 맞추고 다시 시도해 주세요.");
            }
        } catch (err) {
            console.error(err);
            alert("판독 중 오류가 발생했습니다.");
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    // 5. 일반 사진 첨부 및 데이터 용량 압축 처리
    let currentPhotoBase64 = null;
    function triggerCameraInput() {
        document.getElementById('photoFile').click();
    }

    function handlePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 저장 용량을 최소화하기 위해 고해상도 촬영 사진을 500px 크기로 자동 압축 리사이징
                    const canvas = document.createElement('canvas');
                    const max_size = 500;
                    let width = img.width;
                    let height = img.height;
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('photoPreview').src = currentPhotoBase64;
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 6. DB 데이터 저장 및 누적 리스트 인터페이스 출력
    function saveToDatabase() {
        const code = document.getElementById('productCode').value.trim();
        const qty = parseInt(document.getElementById('productQty').value);
        
        // 유효성 검사 기준 변경 (2~6자리 숫자 체크)
        if (!/^\d{2,6}$/.test(code)) {
            alert("코드는 2자리에서 6자리 사이의 숫자여야 합니다.");
            return;
        }

        const transaction = db.transaction(["items"], "readwrite");
        const store = transaction.objectStore("items");
        
        const itemData = {
            code: code,
            qty: qty,
            photo: currentPhotoBase64,
            date: new Date().toLocaleString('ko-KR')
        };
        
        store.put(itemData);
        
        transaction.oncomplete = function() {
            alert(`코드 [${code}] 저장 완료!`);
            // 입력 폼 초기화
            document.getElementById('productCode').value = '';
            document.getElementById('productQty').value = '1';
            document.getElementById('photoPreview').src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>";
            currentPhotoBase64 = null;
            loadHistory();
        };
    }

    function loadHistory() {
        if (!db) return;
        const store = db.transaction(["items"], "readonly").objectStore("items");
        const listContainer = document.getElementById('historyList');
        listContainer.innerHTML = '';
        
        let count = 0;
        store.openCursor(null, "prev").onsuccess = function(e) {
            const cursor = e.target.result;
            if (cursor) {
                count++;
                const item = cursor.value;
                const div = document.createElement('div');
                div.className = 'history-item';
                
                const defaultImg = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/></svg>";
                const imgSrc = item.photo ? item.photo : defaultImg;
                
                div.innerHTML = `
                    <div class="info-zone">
                        <img class="img-preview" style="width:40px; height:40px;" src="${imgSrc}">
                        <div>
                            <div><span class="code-tag">${item.code}</span> <strong>${item.qty} 개</strong></div>
                            <small style="color:#9ca3af; font-size:0.75rem;">${item.date}</small>
                        </div>
                    </div>
                    <button style="background:#ef4444; padding:4px 8px; font-size:0.8rem;" onclick="deleteItem('${item.code}')">삭제</button>
                `;
                listContainer.appendChild(div);
                cursor.continue();
            } else if (count === 0) {
                listContainer.innerHTML = '<p style="text-align:center; color:#9ca3af; padding:20px; font-size:0.9rem;">등록된 내역이 없습니다.</p>';
            }
        };
    }

    function deleteItem(code) {
        if(confirm(`코드 [${code}] 항목을 삭제하시겠습니까?`)) {
            const transaction = db.transaction(["items"], "readwrite");
            transaction.objectStore("items").delete(code);
            transaction.oncomplete = function() {
                loadHistory();
            };
        }
    }
</script>
</body>
</html>
