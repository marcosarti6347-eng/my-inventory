<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no">
    <title>현장 실물 확인 시스템 (수기 전용)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f5f7fb; color: #333; padding: 15px; -webkit-user-select: none; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 15px; color: #1e3a8a; font-size: 1.4rem; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .card-title { font-size: 1.05rem; font-weight: bold; margin-bottom: 15px; color: #4b5563; border-bottom: 2px solid #f3f4f6; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; color: #4b5563; margin-bottom: 8px; font-weight: bold; }
        
        /* 입력창 디자인 대폭 확대 */
        input[type="text"] { width: 100%; padding: 15px; border: 3px solid #cbd5e1; border-radius: 8px; font-size: 1.5rem; background: #ffffff; color: #111; font-weight: bold; text-align: center; letter-spacing: 1px; }
        input[type="text"]:focus { border-color: #2563eb; outline: none; }
        
        /* 알림 메시지 */
        #searchStatus { font-size: 1rem; font-weight: bold; text-align: center; margin: 15px 0; min-height: 1.5rem; padding: 5px; border-radius: 6px; }
        .status-found { color: #1e40af; background-color: #eff6ff; }
        .status-new { color: #b91c1c; background-color: #fef2f2; }

        /* 버튼류 */
        button { color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn-photo { background-color: #4b5563; margin-bottom: 10px; }
        .btn-photo:active { background-color: #374151; }
        .btn-save { background-color: #10b981; }
        .btn-save:active { background-color: #059669; }
        .btn-delete { background-color: #ef4444; padding: 6px 10px; font-size: 0.85rem; width: auto; border-radius: 6px; }

        /* 사진 영역 */
        .photo-area { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 15px; border: 2px dashed #cbd5e1; border-radius: 12px; background: #fafafa; min-height: 200px; justify-content: center; }
        .img-preview-large { width: 100%; max-width: 280px; aspect-ratio: 1; border-radius: 12px; object-fit: cover; background: #f3f4f6; border: 1px solid #cbd5e1; }
        
        /* 내역 리스트 */
        .history-container { max-height: 250px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #edf2f7; }
        .history-item:last-child { border-bottom: none; }
        .code-tag { background: #eff6ff; color: #1e40af; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 실물 확인 장부 시스템</h2>
    
    <div class="card">
        <div class="card-title">⌨️ 코드 번호 입력</div>

        <!-- 번호 입력 칸 (글씨를 크게 키웠습니다) -->
        <div class="form-group">
            <label>여기에 코드 번호를 입력하세요</label>
            <input type="text" id="productCode" placeholder="숫자 번호 입력" oninput="searchCode(this.value)">
        </div>

        <!-- 상태 안내 문구 (자동 조회 결과) -->
        <div id="searchStatus">번호를 입력하면 등록 여부를 확인합니다.</div>

        <!-- 사진 표시 및 촬영 영역 -->
        <div class="form-group">
            <div class="photo-area">
                <img id="photoPreview" class="img-preview-large" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='1'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>">
                
                <!-- 신규 등록 시에만 나타나는 버튼들 -->
                <div id="newRegButtons" style="display:none; width:100%;">
                    <button type="button" class="btn-photo" onclick="triggerCameraInput()">📷 신규 사진 촬영하기</button>
                    <input type="file" id="photoFile" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(this)">
                    <button type="button" class="btn-save" onclick="saveToDatabase()">✅ 장부에 신규 등록</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 최근 등록 내역 -->
    <div class="card">
        <div class="card-title">📋 최근 장부 등록 내역</div>
        <div id="historyList" class="history-container">
            <p style="text-align:center; color:#9ca3af; padding:20px; font-size:0.9rem;">등록된 내역이 없습니다.</p>
        </div>
    </div>
</div>

<script>
    let db = null;
    // 에러 방지를 위해 새로운 데이터베이스 이름 사용
    const request = indexedDB.open("FinalManualMatchDB", 1);
    
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("checks")) {
            const store = db.createObjectStore("checks", { keyPath: "id", autoIncrement: true });
            store.createIndex("code", "code", { unique: false });
        }
    };
    
    request.onsuccess = (e) => { 
        db = e.target.result; 
        loadHistory(); 
    };

    request.onerror = (e) => {
        alert("장부 시스템을 여는데 실패했습니다. 브라우저를 새로고침 해주세요.");
    };

    // 말하기 기능
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // 겹치지 않게 초기화
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            window.speechSynthesis.speak(msg);
        }
    }

    // 번호 입력 시 실시간 조회 (핵심 기능)
    function searchCode(val) {
        const status = document.getElementById('searchStatus');
        const preview = document.getElementById('photoPreview');
        const regButtons = document.getElementById('newRegButtons');
        
        // 공백 제거
        val = val.trim();

        if (!val) {
            status.className = "";
            status.innerText = "번호를 입력하면 등록 여부를 확인합니다.";
            regButtons.style.display = "none";
            preview.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='1'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>";
            return;
        }

        if (!db) return;

        const transaction = db.transaction("checks", "readonly");
        const store = transaction.objectStore("checks");
        const index = store.index("code");
        const req = index.get(val);

        req.onsuccess = () => {
            if (req.result) {
                // [기존 번호 발견]
                status.className = "status-found";
                status.innerText = "📢 이미 등록된 코드입니다! 아래 사진을 확인하세요.";
                preview.src = req.result.photo;
                regButtons.style.display = "none";
                speak("이전에 등록된 사진을 찾았습니다.");
            } else {
                // [신규 번호]
                status.className = "status-new";
                status.innerText = "❓ 처음 보는 번호입니다. 신규 등록하시겠습니까?";
                preview.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23b91c1c' stroke-width='1.5'><path d='M12 5v14M5 12h14'/></svg>";
                regButtons.style.display = "block";
            }
        };
    }

    // 사진기 작동 트리거
    let currentPhoto = null;
    function triggerCameraInput() { 
        document.getElementById('photoFile').click(); 
    }
    
    // 찍은 사진 가공 프로세스
    function handlePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 600; // 저장 화질 최적화 크기
                    let w = img.width, h = img.height;
                    if (w > h) { h *= size/w; w = size; } else { w *= size/h; h = size; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentPhoto = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('photoPreview').src = currentPhoto;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 장부 저장
    function saveToDatabase() {
        const code = document.getElementById('productCode').value.trim();
        if (!code) { alert("코드를 입력해 주세요."); return; }
        if (!currentPhoto) { alert("📷 사진 촬영하기 버튼을 눌러 사진을 먼저 찍어주세요."); return; }
        
        const tx = db.transaction("checks", "readwrite");
        tx.objectStore("checks").add({ code, photo: currentPhoto, date: new Date().toLocaleString('ko-KR') });
        
        tx.oncomplete = () => {
            alert("장부에 성공적으로 등록되었습니다!");
            currentPhoto = null;
            loadHistory();
            searchCode(code); // 화면 상태 갱신
        };
    }

    // 과거 내역 불러오기
    function loadHistory() {
        if (!db) return;
        const store = db.transaction("checks", "readonly").objectStore("checks");
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let count = 0;
        
        store.openCursor(null, "prev").onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                count++;
                const item = cursor.value;
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;">
                        <img src="${item.photo}" style="width:50px; height:50px; border-radius:6px; object-fit:cover; border:1px solid #ddd;">
                        <div>
                            <span class="code-tag">${item.code}</span>
                            <br><small style="color:#888; font-size:0.75rem;">${item.date}</small>
                        </div>
                    </div>
                    <button type="button" class="btn-delete" onclick="deleteItem(${item.id})">삭제</button>
                `;
                list.appendChild(div);
                cursor.continue();
            } else if (count === 0) {
                list.innerHTML = '<p style="text-align:center; color:#9ca3af; padding:20px; font-size:0.9rem;">등록된 내역이 없습니다.</p>';
            }
        };
    }

    // 내역 삭제
    function deleteItem(id) {
        if (confirm("이 등록 내역을 삭제하시겠습니까?")) {
            const tx = db.transaction("checks", "readwrite");
            tx.objectStore("checks").delete(id);
            tx.oncomplete = () => { 
                loadHistory(); 
                document.getElementById('productCode').value = '';
                searchCode('');
            };
        }
    }
</script>
</body>
</html>
