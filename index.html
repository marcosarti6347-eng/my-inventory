<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 최적화 고정밀 확인 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f5f7fb; color: #333; padding: 15px; -webkit-user-select: none; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 15px; color: #1e3a8a; font-size: 1.4rem; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .card-title { font-size: 1rem; font-weight: bold; margin-bottom: 10px; color: #4b5563; display: flex; justify-content: space-between; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #6b7280; margin-bottom: 6px; font-weight: 600; }
        .input-row { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1.1rem; background: #f9fafb; color: #111; font-weight: bold; text-align: center; letter-spacing: 2px; }
        button { background-color: #2563eb; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; }
        button:active { background-color: #1d4ed8; }
        button.btn-success { background-color: #10b981; width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 10px; }
        button.btn-success:active { background-color: #059669; }
        button.btn-secondary { background-color: #4b5563; }
        #cameraModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        #videoContainer { position: relative; width: 92%; max-width: 400px; aspect-ratio: 1; border-radius: 16px; overflow: hidden; border: 3px solid #3b82f6; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 20%; border: 3px dashed #10b981; box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.65); pointer-events: none; border-radius: 8px; }
        .scan-guide::after { content: "숫자 코드(2~6자리)를 칸 안에 똑바로 맞추세요"; position: absolute; top: -28px; left: 50%; transform: translateX(-50%); color: #10b981; font-size: 0.85rem; font-weight: bold; white-space: nowrap; background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; }
        .camera-controls { margin-top: 25px; display: flex; gap: 15px; width: 92%; max-width: 400px; }
        .camera-controls button { flex: 1; padding: 15px; font-size: 1.05rem; border-radius: 10px; }
        #loadingOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 10; font-weight: bold; font-size: 1.1rem; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #3b82f6; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .photo-area { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 15px; border: 2px dashed #e5e7eb; border-radius: 12px; background: #fafafa; }
        .img-preview-large { width: 100%; max-width: 220px; aspect-ratio: 1; border-radius: 12px; object-fit: cover; background: #f3f4f6; border: 1px solid #d1d5db; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #edf2f7; }
        .history-item:last-child { border-bottom: none; }
        .code-tag { background: #eff6ff; color: #1e40af; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 실물 확인 및 매칭 시스템</h2>
    
    <div class="card">
        <div class="card-title">고정밀 코드 실물 대조</div>
        
        <div class="form-group">
            <label>판독된 제품 코드</label>
            <div class="input-row">
                <input type="text" id="productCode" placeholder="오른쪽 스캔 버튼 터치" readonly>
                <button type="button" onclick="openScanner()" style="padding: 0 20px; font-size: 1.05rem;">📸 스캔</button>
            </div>
        </div>

        <div class="form-group">
            <label>현장 실물 사진 등록</label>
            <div class="photo-area">
                <img id="photoPreview" class="img-preview-large" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='1'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>">
                <button type="button" class="btn-secondary" onclick="triggerCameraInput()">🖼️ 실물 사진 촬영하기</button>
                <input type="file" id="photoFile" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto(this)">
            </div>
        </div>

        <button class="btn-success" onclick="saveToDatabase()">✅ 매칭 확인 완료 및 저장</button>
    </div>

    <div class="card">
        <div class="card-title">최근 매칭 확인 내역</div>
        <div id="historyList" style="max-height: 250px; overflow-y: auto;">
            <p style="text-align:center; color:#9ca3af; padding:20px; font-size:0.9rem;">확인된 내역이 없습니다.</p>
        </div>
    </div>
</div>

<!-- 스캔 모달 영역 -->
<div id="cameraModal">
    <div id="videoContainer">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-guide"></div>
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div id="loadingText">고정밀 엔진 준비 중...</div>
        </div>
    </div>
    <div class="camera-controls">
        <button type="button" class="btn-secondary" onclick="closeScanner()">취소</button>
        <button type="button" onclick="captureAndOCR()" style="background-color:#10b981; font-size: 1.1rem;">🎯 번호 읽기</button>
    </div>
</div>

<script>
    let db = null;
    const request = indexedDB.open("MatchCheckDBV3", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("checks")) { 
            db.createObjectStore("checks", { keyPath: "id", autoIncrement: true }); 
        }
    };
    request.onsuccess = (e) => { db = e.target.result; loadHistory(); };

    let scheduler = null;
    async function initOCR() {
        if (!scheduler) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').innerText = "고정밀 엔진 시동 중...";
            try {
                scheduler = Tesseract.createScheduler();
                const worker = await Tesseract.createWorker('eng');
                // 오직 숫자만 읽도록 화이트리스트 강제 고정
                await worker.setParameters({ 
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: '7' // 단일 텍스트 라인 모드로 설정하여 인식률 향상
                });
                scheduler.addWorker(worker);
            } catch (err) {
                alert("엔진 로드 실패. 신호 상태를 확인해 주세요.");
                closeScanner();
                return;
            }
        }
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    let stream = null;
    async function openScanner() {
        document.getElementById('cameraModal').style.display = 'flex';
        await initOCR();
        try {
            // S26 초점 매칭을 위해 적정 표준 해상도 지정
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            document.getElementById('video').srcObject = stream;
        } catch (err) { 
            alert("카메라 권한이 거부되었거나 연결에 실패했습니다."); 
            closeScanner(); 
        }
    }

    function closeScanner() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('cameraModal').style.display = 'none';
    }

    async function captureAndOCR() {
        const video = document.getElementById('video');
        if (!video.videoWidth || !video.videoHeight) return;

        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('loadingText').innerText = "이미지 선명화 가공 중...";
        
        const canvas = document.createElement('canvas');
        const scale = video.videoWidth / video.clientWidth;
        
        // 조준창(가이드) 영역 계산
        const boxWidth = video.clientWidth * 0.80 * scale;
        const boxHeight = video.clientHeight * 0.20 * scale;
        canvas.width = boxWidth; 
        canvas.height = boxHeight;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, (video.videoWidth - boxWidth)/2, (video.videoHeight - boxHeight)/2, boxWidth, boxHeight, 0, 0, boxWidth, boxHeight);
        
        // --- 고정밀 이미지 전처리 프로세스 (흑백 고대비 최적화) ---
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            // 임계값 처리로 노이즈 제거 및 완전 흑백화
            const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
            const v = (brightness > 130) ? 255 : 0; // 130 기준으로 흑/백 분리
            data[i] = v; data[i+1] = v; data[i+2] = v;
        }
        ctx.putImageData(imgData, 0, 0);
        // -----------------------------------------------------

        document.getElementById('loadingText').innerText = "정밀 인공지능 번호 판독 중...";

        try {
            const { data: { text } } = await scheduler.addJob('recognize', canvas);
            const cleanedText = text.replace(/\D/g, ''); // 숫자 외 찌꺼기 문자 완전 배제
            
            // 현장 장부 규격에 맞는 2~6자리 숫자 필터링 추출
            const matches = cleanedText.match(/\d{2,6}/);
            
            if (matches && matches[0].length >= 2 && matches[0].length <= 6) {
                document.getElementById('productCode').value = matches[0];
                
                if ('speechSynthesis' in window) {
                    const speech = new SpeechSynthesisUtterance(`판독 완료`);
                    speech.lang = 'ko-KR'; window.speechSynthesis.speak(speech);
                }
                closeScanner();
            } else {
                alert("숫자 코드가 명확하게 읽히지 않았습니다.\n\n[팁] 글자를 수평으로 맞추고 빛 반사를 조금만 피해서 다시 찍어주세요.");
            }
        } catch (err) {
            alert("판독 부하가 발생했습니다. 다시 한 번 눌러주세요.");
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    let currentPhoto = null;
    function triggerCameraInput() { document.getElementById('photoFile').click(); }
    function handlePhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = 600;
                    let w = img.width, h = img.height;
                    if (w > h) { h *= size/w; w = size; } else { w *= size/h; h = size; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    currentPhoto = canvas.toDataURL('image/jpeg', 0.75);
                    document.getElementById('photoPreview').src = currentPhoto;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveToDatabase() {
        const code = document.getElementById('productCode').value;
        if (!code) { alert("먼저 [스캔] 버튼을 눌러 코드를 판독해 주세요."); return; }
        if (!currentPhoto) { alert("실물 사진을 촬영해 주세요."); return; }

        const tx = db.transaction("checks", "readwrite");
        tx.objectStore("checks").add({ code, photo: currentPhoto, date: new Date().toLocaleString('ko-KR') });
        tx.oncomplete = () => {
            alert(`코드 [${code}] 저장 완료되었습니다.`);
            document.getElementById('productCode').value = '';
            document.getElementById('photoPreview').src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='1'><rect x='3' y='3' width='18' height='18' rx='2' ry='2'/><circle cx='8.5' cy='8.5' r='1.5'/><polyline points='21 15 16 10 5 21'/></svg>";
            currentPhoto = null;
            loadHistory();
        };
    }

    function loadHistory() {
        if (!db) return;
        const store = db.transaction("checks", "readonly").objectStore("checks");
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        let count = 0;
        
        store.openCursor(null, "prev").onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                count++;
                const item = cursor.value;
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:12px;">
                        <img src="${item.photo}" style="width:50px; height:50px; border-radius:6px; object-fit:cover; border:1px solid #ddd;">
                        <div>
                            <span class="code-tag">${item.code}</span>
                            <br><small style="color:#888; font-size:0.75rem;">${item.date}</small>
                        </div>
                    </div>
                    <button style="background:#ef4444; padding:5px 10px; font-size:0.8rem; border-radius:6px;" onclick="deleteItem(${item.id})">삭제</button>
                `;
                list.appendChild(div);
                cursor.continue();
            } else if (count === 0) {
                list.innerHTML = '<p style="text-align:center; color:#9ca3af; padding:20px; font-size:0.9rem;">확인된 내역이 없습니다.</p>';
            }
        };
    }

    function deleteItem(id) {
        if (confirm("이 확인 내역을 목록에서 삭제하시겠습니까?")) {
            const tx = db.transaction("checks", "readwrite");
            tx.objectStore("checks").delete(id);
            tx.oncomplete = () => { loadHistory(); };
        }
    }
</script>
</body>
</html>
